experiment_name: stage2_standard_reid
seed: 42

detector:
  type: yolo26
  model_name: yolo26m
  weights_path: yolo26m
  nms_free: true
  img_size: 1280
  max_detections: 200
  confidence_threshold: 0.25
  iou_threshold: 0.7
  classes: [0]
  half_precision: true
  device: null

tracker:
  type: bytetrack
  track_threshold: 0.5
  track_low_threshold: 0.1
  new_track_threshold: 0.6
  match_threshold: 0.8
  track_buffer: 30
  min_box_area: 10.0
  frame_rate: 25
  mot20: false
  use_embeddings: true
  association_alpha: 0.6
  embedding_weight: 0.4
  motion_weight: 0.6
  device: null

reid:
  type: osnet
  model_name: osnet_x1_0
  pretrained: true
  model_path: null
  input_size: [256, 128]
  batch_size: 32
  fp16: true
  normalize_embeddings: true
  device: null

runtime:
  use_cuda: true
  cudnn_benchmark: true
  num_workers: 2
  pin_memory: true

dataset:
  soccernet:
    root_dir: /kaggle/input/soccernet-tracking
    subset: tracking
    split: [train, valid, test]
    password: null
    auto_download: true
